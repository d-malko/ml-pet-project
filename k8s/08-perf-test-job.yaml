# K8s Job для performance тестов
# Запускается после обучения и временного деплоя модели
# Тестирует реальную модель из MinIO (не stub)
apiVersion: batch/v1
kind: Job
metadata:
  name: perf-test
  namespace: ml-serving
  labels:
    app: perf-test
    component: testing
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: perf-test
    spec:
      restartPolicy: Never
      containers:
        - name: locust
          image: ml-model-train:latest
          imagePullPolicy: Never
          command:
            - /bin/bash
            - -c
            - |
              set -e
              pip install locust --quiet

              echo "Starting performance tests against ${TARGET_HOST}..."
              mkdir -p /results

              locust -f /app/tests/performance/locustfile.py \
                --host=${TARGET_HOST} \
                --users=${LOCUST_USERS:-30} \
                --spawn-rate=${LOCUST_SPAWN_RATE:-5} \
                --run-time=${LOCUST_RUN_TIME:-2m} \
                --headless \
                --csv=/results/perf \
                --html=/results/perf_report.html \
                --exit-code-on-error=1

              # Выводим сводку SLO
              echo ""
              echo "=== SLO Summary ==="
              python3 - << 'PYEOF'
              import csv, sys

              with open('/results/perf_stats.csv') as f:
                  rows = list(csv.DictReader(f))

              # Агрегированная строка
              agg = next((r for r in rows if r['Name'] == 'Aggregated'), None)
              if not agg:
                  print("No aggregated stats found"); sys.exit(1)

              p95 = float(agg.get('95%', 0))
              p99 = float(agg.get('99%', 0))
              fail_pct = float(agg.get('Failure Count', 0)) / max(float(agg.get('Request Count', 1)), 1) * 100

              print(f"P95 latency:  {p95:.0f}ms  (SLO: <250ms)  {'✅' if p95 < 250 else '❌'}")
              print(f"P99 latency:  {p99:.0f}ms  (SLO: <500ms)  {'✅' if p99 < 500 else '❌'}")
              print(f"Error rate:   {fail_pct:.2f}%  (SLO: <1%)     {'✅' if fail_pct < 1 else '❌'}")

              if p95 >= 250 or p99 >= 500 or fail_pct >= 1:
                  print("\n❌ SLO VIOLATED — deploy blocked")
                  sys.exit(1)
              else:
                  print("\n✅ All SLOs passed")
              PYEOF
          env:
            - name: TARGET_HOST
              value: "http://ml-model.ml-serving.svc.cluster.local"
            - name: LOCUST_USERS
              value: "30"
            - name: LOCUST_SPAWN_RATE
              value: "5"
            - name: LOCUST_RUN_TIME
              value: "2m"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
